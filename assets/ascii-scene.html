<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Scene</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #fff;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <script>
      (function () {
        var canvas = document.getElementById("scene");
        var ctx = canvas.getContext("2d");
        var source = new Image();
        var offscreen = document.createElement("canvas");
        var offCtx = offscreen.getContext("2d", { willReadFrequently: true });
        var dpr = window.devicePixelRatio || 1;
        var accent = "#f3ae31";
        var portraitPoints = [];
        var planePoints = [];
        var mouseX = -0.9;
        var autoAngle = -0.95;
        var ready = false;

        function resize() {
          var width = Math.max(1, Math.floor(window.innerWidth));
          var height = Math.max(1, Math.floor(window.innerHeight));
          canvas.width = Math.floor(width * dpr);
          canvas.height = Math.floor(height * dpr);
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          return { width: width, height: height };
        }

        function luminance(r, g, b) {
          return 0.2126 * r + 0.7152 * g + 0.0722 * b;
        }

        function samplePortrait() {
          var sampleW = 110;
          var sampleH = 150;
          offscreen.width = sampleW;
          offscreen.height = sampleH;

          var scale = Math.max(sampleW / source.naturalWidth, sampleH / source.naturalHeight);
          var drawW = source.naturalWidth * scale;
          var drawH = source.naturalHeight * scale;
          var dx = (sampleW - drawW) / 2;
          var dy = (sampleH - drawH) / 2;

          offCtx.clearRect(0, 0, sampleW, sampleH);
          offCtx.drawImage(source, dx, dy, drawW, drawH);

          var imageData = offCtx.getImageData(0, 0, sampleW, sampleH).data;
          portraitPoints = [];
          planePoints = [];

          for (var row = 0; row < sampleH; row += 2) {
            for (var col = 0; col < sampleW; col += 1) {
              var idx = (row * sampleW + col) * 4;
              var lum = luminance(imageData[idx], imageData[idx + 1], imageData[idx + 2]);
              var darkness = 1 - lum / 255;
              var nx = col / sampleW - 0.5;
              var ny = row / sampleH - 0.5;

              if (darkness > 0.14) {
                portraitPoints.push({
                  x: nx * 1.3,
                  y: ny * 1.8,
                  z: darkness * 0.32 + (Math.random() - 0.5) * 0.02,
                  size: darkness > 0.42 ? 1.2 : 0.9
                });

                if (Math.random() < darkness * 0.18) {
                  portraitPoints.push({
                    x: nx * 1.3 + (Math.random() - 0.5) * 0.09,
                    y: ny * 1.8 + (Math.random() - 0.5) * 0.09,
                    z: darkness * 0.38 + Math.random() * 0.04,
                    size: 0.85
                  });
                }
              }
            }
          }

          for (var py = -0.95; py <= 0.95; py += 0.03) {
            for (var px = -0.72; px <= 0.72; px += 0.02) {
              planePoints.push({
                x: px,
                y: py,
                z: -0.09,
                size: 0.8
              });
            }
          }

          ready = true;
        }

        function project(point, angleY, angleX, scale, width, height) {
          var cosY = Math.cos(angleY);
          var sinY = Math.sin(angleY);
          var cosX = Math.cos(angleX);
          var sinX = Math.sin(angleX);

          var x1 = point.x * cosY - point.z * sinY;
          var z1 = point.x * sinY + point.z * cosY;
          var y1 = point.y * cosX - z1 * sinX;
          var z2 = point.y * sinX + z1 * cosX;

          var perspective = 1 / (1 + z2 * 0.85 + 0.35);

          return {
            x: width * 0.52 + x1 * scale * perspective,
            y: height * 0.53 + y1 * scale * perspective,
            size: point.size * perspective,
            depth: z2
          };
        }

        function render() {
          var viewport = resize();
          var width = viewport.width;
          var height = viewport.height;

          ctx.clearRect(0, 0, width, height);
          ctx.fillStyle = "#fff";
          ctx.fillRect(0, 0, width, height);

          var angleY = autoAngle + mouseX * 0.18;
          var angleX = 0.12;
          var scale = Math.min(width, height) * 0.52;

          if (!ready) {
            requestAnimationFrame(render);
            return;
          }

          var allPoints = [];
          for (var i = 0; i < planePoints.length; i += 1) {
            var projectedPlane = project(planePoints[i], angleY, angleX, scale, width, height);
            allPoints.push({
              x: projectedPlane.x,
              y: projectedPlane.y,
              size: projectedPlane.size,
              depth: projectedPlane.depth,
              alpha: 0.95
            });
          }

          for (var j = 0; j < portraitPoints.length; j += 1) {
            var projectedPortrait = project(portraitPoints[j], angleY, angleX, scale, width, height);
            allPoints.push({
              x: projectedPortrait.x,
              y: projectedPortrait.y,
              size: projectedPortrait.size,
              depth: projectedPortrait.depth + 0.2,
              alpha: projectedPortrait.depth > 0 ? 0.95 : 0.85
            });
          }

          allPoints.sort(function (a, b) {
            return a.depth - b.depth;
          });

          ctx.fillStyle = accent;
          for (var k = 0; k < allPoints.length; k += 1) {
            var p = allPoints[k];
            ctx.globalAlpha = p.alpha;
            ctx.fillRect(p.x, p.y, Math.max(0.8, p.size * 1.8), Math.max(0.8, p.size * 1.8));
          }
          ctx.globalAlpha = 1;

          autoAngle += 0.002;
          requestAnimationFrame(render);
        }

        source.onload = function () {
          try {
            samplePortrait();
          } catch (error) {
            ready = false;
          }
        };

        source.src = "./portrait-source.png";

        window.addEventListener("mousemove", function (event) {
          mouseX = event.clientX / Math.max(1, window.innerWidth) - 0.5;
        });

        window.addEventListener("resize", render);
        render();
      })();
    </script>
  </body>
</html>
